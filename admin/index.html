<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administration - L'atelier d'Estelle</title>
<meta name="robots" content="noindex, nofollow">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Poppins', Arial, sans-serif;
    background: #fdf8f6;
    color: #5a4d4f;
    min-height: 100vh;
  }
  .login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .login-box {
    background: #fff;
    padding: 2.5rem;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(58, 44, 46, 0.08);
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .login-box h1 {
    font-family: 'Georgia', serif;
    color: #3a2c2e;
    font-size: 1.6rem;
    margin-bottom: 1.5rem;
  }
  .login-box input {
    width: 100%;
    padding: 0.8rem 1rem;
    border: 1px solid #f7e4ea;
    border-radius: 12px;
    font-size: 1rem;
    margin-bottom: 1rem;
  }
  .login-box button, .btn {
    width: 100%;
    padding: 0.8rem 1rem;
    border: none;
    border-radius: 999px;
    background: #c98ba0;
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .login-box button:hover, .btn:hover { background: #b06f86; }
  .error-msg { color: #c0392b; margin-top: 0.75rem; font-size: 0.9rem; }

  .app { display: none; max-width: 1100px; margin: 0 auto; padding: 2rem 1.25rem; }
  header.top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 1rem;
  }
  header.top h1 {
    font-family: 'Georgia', serif;
    color: #3a2c2e;
    font-size: 1.6rem;
  }
  .logout-btn {
    background: none;
    border: 1px solid #f7e4ea;
    border-radius: 999px;
    padding: 0.5rem 1.2rem;
    cursor: pointer;
    color: #5a4d4f;
    font-family: inherit;
  }
  .filters {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }
  .filters button {
    padding: 0.5rem 1.1rem;
    border-radius: 999px;
    border: 1px solid #f7e4ea;
    background: #fff;
    cursor: pointer;
    font-family: inherit;
    color: #5a4d4f;
  }
  .filters button.active {
    background: #c98ba0;
    color: #fff;
    border-color: #c98ba0;
  }
  .appointments-list {
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
  }
  .apt-card {
    background: #fff;
    border-radius: 16px;
    padding: 1.25rem;
    box-shadow: 0 4px 16px rgba(58, 44, 46, 0.06);
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    gap: 1rem;
    align-items: center;
    border-left: 4px solid #f7e4ea;
  }
  .apt-card.status-confirmed { border-left-color: #6fbf73; }
  .apt-card.status-cancelled { border-left-color: #c0392b; opacity: 0.6; }
  .apt-card.status-pending { border-left-color: #e0a96d; }
  .apt-main { flex: 1; min-width: 200px; }
  .apt-date { font-weight: 700; color: #3a2c2e; font-size: 1.05rem; }
  .apt-service { color: #c98ba0; font-weight: 600; margin-top: 0.2rem; }
  .apt-client { margin-top: 0.4rem; font-size: 0.9rem; }
  .apt-notes { margin-top: 0.4rem; font-size: 0.85rem; opacity: 0.75; font-style: italic; }
  .status-badge {
    display: inline-block;
    padding: 0.25rem 0.75rem;
    border-radius: 999px;
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: capitalize;
  }
  .status-badge.pending { background: #fbeede; color: #b9762f; }
  .status-badge.confirmed { background: #e6f4ea; color: #1e7d3a; }
  .status-badge.cancelled { background: #fbe7e9; color: #c0392b; }
  .apt-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .apt-actions button {
    padding: 0.45rem 0.9rem;
    border-radius: 999px;
    border: 1px solid #f7e4ea;
    background: #fff;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.85rem;
    color: #5a4d4f;
  }
  .apt-actions button:hover { background: #f7e4ea; }
  .apt-actions button.danger:hover { background: #fbe7e9; color: #c0392b; }
  .empty-msg { text-align: center; padding: 3rem 1rem; opacity: 0.6; }

  .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; }
  .tab-btn {
    padding: 0.6rem 1.4rem;
    border-radius: 999px;
    border: 1px solid #f7e4ea;
    background: #fff;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    color: #5a4d4f;
  }
  .tab-btn.active { background: #3a2c2e; color: #fff; border-color: #3a2c2e; }
  .view { display: none; }
  .view.active { display: block; }
  .toolbar { display: flex; justify-content: flex-end; margin-bottom: 1rem; }
  .add-btn {
    padding: 0.6rem 1.3rem;
    border: none;
    border-radius: 999px;
    background: #c98ba0;
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .add-btn:hover { background: #b06f86; }

  .search-input {
    width: 100%;
    padding: 0.7rem 1rem;
    border: 1px solid #f7e4ea;
    border-radius: 12px;
    font-family: inherit;
    font-size: 0.95rem;
    margin-bottom: 1.25rem;
  }

  .clients-list { display: flex; flex-direction: column; gap: 0.6rem; }
  .client-card {
    background: #fff;
    border-radius: 14px;
    padding: 1rem 1.25rem;
    box-shadow: 0 4px 16px rgba(58, 44, 46, 0.06);
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .client-card:hover { background: #fdf3f6; }
  .client-card__name { font-weight: 700; color: #3a2c2e; }
  .client-card__meta { font-size: 0.85rem; opacity: 0.7; margin-top: 0.2rem; }
  .client-card__count {
    font-size: 0.8rem;
    background: #f7e4ea;
    color: #b06f86;
    padding: 0.25rem 0.7rem;
    border-radius: 999px;
    font-weight: 600;
    white-space: nowrap;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(58, 44, 46, 0.45);
    align-items: center;
    justify-content: center;
    padding: 1rem;
    z-index: 100;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #fff;
    border-radius: 18px;
    padding: 1.75rem;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h2 {
    font-family: 'Georgia', serif;
    color: #3a2c2e;
    margin-bottom: 1.25rem;
    font-size: 1.3rem;
  }
  .modal .form-row { margin-bottom: 0.9rem; display: flex; flex-direction: column; gap: 0.3rem; }
  .modal label { font-size: 0.85rem; font-weight: 600; color: #3a2c2e; }
  .modal input, .modal select, .modal textarea {
    padding: 0.65rem 0.9rem;
    border: 1px solid #f7e4ea;
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.95rem;
  }
  .modal textarea { resize: vertical; min-height: 70px; }
  .modal .form-row-2 { display: flex; gap: 0.75rem; }
  .modal .form-row-2 > div { flex: 1; display: flex; flex-direction: column; gap: 0.3rem; }
  .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.25rem; }
  .modal-actions button {
    flex: 1;
    padding: 0.7rem;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    font-size: 0.95rem;
  }
  .modal-actions .save-btn { background: #c98ba0; color: #fff; }
  .modal-actions .save-btn:hover { background: #b06f86; }
  .modal-actions .cancel-btn { background: #f7e4ea; color: #5a4d4f; }
  .modal-actions .cancel-btn:hover { background: #f0d3dc; }
  .modal-error { color: #c0392b; font-size: 0.9rem; margin-top: 0.5rem; display: none; }

  /* Calendrier de date (modal rendez-vous) */
  .booking-calendar {
    background: #f7e4ea;
    border-radius: 14px;
    padding: 1rem;
  }
  .booking-calendar__header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.75rem;
  }
  .booking-calendar__title {
    font-family: 'Georgia', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: #3a2c2e;
    text-transform: capitalize;
  }
  .booking-calendar__nav {
    width: 32px;
    height: 32px;
    border: none;
    border-radius: 50%;
    background: #fff;
    color: #b06f86;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .booking-calendar__nav:hover { background: #c98ba0; color: #fff; }
  .booking-calendar__nav:disabled { opacity: 0.3; cursor: not-allowed; }
  .booking-calendar__weekdays,
  .booking-calendar__days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0.3rem;
  }
  .booking-calendar__weekdays span {
    text-align: center;
    font-size: 0.78rem;
    font-weight: 600;
    color: #b06f86;
    padding-bottom: 0.4rem;
  }
  .booking-calendar__day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    border-radius: 10px;
    background: #fff;
    font-family: inherit;
    font-size: 0.88rem;
    color: #5a4d4f;
    cursor: pointer;
    transition: all 0.2s;
  }
  .booking-calendar__day:hover { background: #c98ba0; color: #fff; }
  .booking-calendar__day.active { background: #c98ba0; color: #fff; }
  .booking-calendar__day.disabled,
  .booking-calendar__day.empty { background: transparent; cursor: default; opacity: 0.35; }

  /* Heure / minute */
  .time-picker { display: flex; align-items: center; gap: 0.5rem; }
  .time-picker select {
    padding: 0.65rem 0.9rem;
    border: 1px solid #f7e4ea;
    border-radius: 10px;
    font-family: inherit;
    font-size: 0.95rem;
    background: #fff;
    color: #5a4d4f;
    flex: 1;
  }
  .time-picker__sep { font-weight: 700; color: #3a2c2e; }

  .form-row { position: relative; }
  .client-suggestions {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: #fff;
    border: 1px solid #f7e4ea;
    border-radius: 10px;
    margin-top: 0.25rem;
    max-height: 180px;
    overflow-y: auto;
    z-index: 10;
    box-shadow: 0 8px 24px rgba(58, 44, 46, 0.1);
  }
  .client-suggestions.active { display: block; }
  .client-suggestion {
    padding: 0.6rem 0.9rem;
    cursor: pointer;
    font-size: 0.9rem;
  }
  .client-suggestion:hover { background: #f7e4ea; }
  .client-suggestion__name { font-weight: 600; color: #3a2c2e; }
  .client-suggestion__phone { font-size: 0.8rem; opacity: 0.7; }

  /* Client detail */
  .back-link {
    display: inline-block;
    margin-bottom: 1rem;
    cursor: pointer;
    color: #b06f86;
    font-weight: 600;
    font-size: 0.9rem;
  }
  .client-detail__header {
    background: #fff;
    border-radius: 16px;
    padding: 1.25rem;
    box-shadow: 0 4px 16px rgba(58, 44, 46, 0.06);
    margin-bottom: 1.25rem;
  }
  .client-detail__header h2 { font-family: 'Georgia', serif; color: #3a2c2e; margin-bottom: 0.5rem; }
  .client-detail__meta { font-size: 0.9rem; opacity: 0.75; margin-bottom: 0.25rem; }
  .client-notes textarea {
    width: 100%;
    padding: 0.75rem;
    border: 1px solid #f7e4ea;
    border-radius: 12px;
    font-family: inherit;
    font-size: 0.95rem;
    min-height: 90px;
    resize: vertical;
    margin-top: 0.5rem;
  }
  .client-section-title { font-weight: 700; color: #3a2c2e; margin: 1.5rem 0 0.75rem; }
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>Administration</h1>
    <input type="password" id="passwordInput" placeholder="Mot de passe">
    <button id="loginBtn">Se connecter</button>
    <div class="error-msg" id="loginError" style="display:none;"></div>
  </div>
</div>

<div class="app" id="app">
  <header class="top">
    <h1>L'atelier d'Estelle - Administration</h1>
    <button class="logout-btn" id="logoutBtn">Déconnexion</button>
  </header>

  <div class="tabs">
    <button class="tab-btn active" data-tab="appointments">Rendez-vous</button>
    <button class="tab-btn" data-tab="clients">Clients</button>
  </div>

  <!-- Vue Rendez-vous -->
  <div class="view active" id="viewAppointments">
    <div class="toolbar">
      <button class="add-btn" id="newAppointmentBtn">+ Nouveau rendez-vous</button>
    </div>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">Tous</button>
      <button class="filter-btn" data-filter="pending">En attente</button>
      <button class="filter-btn" data-filter="confirmed">Confirmés</button>
      <button class="filter-btn" data-filter="cancelled">Annulés</button>
    </div>
    <div class="appointments-list" id="appointmentsList"></div>
  </div>

  <!-- Vue Clients (liste) -->
  <div class="view" id="viewClients">
    <div class="toolbar">
      <button class="add-btn" id="newClientBtn">+ Nouveau client</button>
    </div>
    <input type="text" class="search-input" id="clientSearch" placeholder="Rechercher un client par nom ou téléphone...">
    <div class="clients-list" id="clientsList"></div>
  </div>

  <!-- Vue Détail client -->
  <div class="view" id="viewClientDetail">
    <span class="back-link" id="backToClients">← Retour aux clients</span>
    <div class="client-detail__header">
      <h2 id="clientDetailName"></h2>
      <div class="form-row">
        <label for="clientEditName">Nom</label>
        <input type="text" id="clientEditName" placeholder="Nom et prénom">
      </div>
      <div class="form-row-2">
        <div>
          <label for="clientEditPhone">Téléphone</label>
          <input type="tel" id="clientEditPhone" placeholder="06 12 34 56 78">
        </div>
        <div>
          <label for="clientEditEmail">Email (optionnel)</label>
          <input type="email" id="clientEditEmail" placeholder="vous@exemple.com">
        </div>
      </div>
      <div class="client-notes">
        <label for="clientNotes"><strong>Notes personnelles</strong></label>
        <textarea id="clientNotes" placeholder="Préférences, allergies, anecdotes à se rappeler..."></textarea>
        <div class="modal-error" id="clientDetailError"></div>
        <div class="modal-actions">
          <button class="cancel-btn" id="deleteClientBtn" style="flex:none; padding:0.6rem 1.4rem;">Supprimer le client</button>
          <button class="save-btn" id="saveNotesBtn" style="flex:none; padding:0.6rem 1.4rem;">Enregistrer</button>
        </div>
      </div>
    </div>
    <div class="client-section-title">Historique des rendez-vous</div>
    <div class="appointments-list" id="clientAppointmentsList"></div>
  </div>
</div>

<!-- Modal nouveau rendez-vous -->
<div class="modal-overlay" id="appointmentModal">
  <div class="modal">
    <h2>Nouveau rendez-vous</h2>
    <div class="form-row">
      <label for="aptService">Prestation</label>
      <select id="aptService"></select>
    </div>
    <div class="form-row">
      <label>Date</label>
      <div class="booking-calendar" id="aptCalendar">
        <div class="booking-calendar__header">
          <button type="button" class="booking-calendar__nav" id="aptCalPrev" aria-label="Mois précédent">‹</button>
          <span class="booking-calendar__title" id="aptCalTitle"></span>
          <button type="button" class="booking-calendar__nav" id="aptCalNext" aria-label="Mois suivant">›</button>
        </div>
        <div class="booking-calendar__weekdays">
          <span>Lun</span><span>Mar</span><span>Mer</span><span>Jeu</span><span>Ven</span><span>Sam</span><span>Dim</span>
        </div>
        <div class="booking-calendar__days" id="aptCalDays"></div>
      </div>
    </div>
    <div class="form-row">
      <label>Heure</label>
      <div class="time-picker">
        <select id="aptHour"></select>
        <span class="time-picker__sep">:</span>
        <select id="aptMinute"></select>
      </div>
    </div>
    <div class="form-row">
      <label for="aptStatus">Statut</label>
      <select id="aptStatus">
        <option value="confirmed">Confirmé</option>
        <option value="pending">En attente</option>
      </select>
    </div>
    <div class="form-row">
      <label for="aptClientName">Nom du client</label>
      <input type="text" id="aptClientName" placeholder="Nom et prénom" autocomplete="off">
      <div class="client-suggestions" id="clientSuggestions"></div>
    </div>
    <div class="form-row-2">
      <div>
        <label for="aptClientPhone">Téléphone</label>
        <input type="tel" id="aptClientPhone" placeholder="06 12 34 56 78">
      </div>
      <div>
        <label for="aptClientEmail">Email (optionnel)</label>
        <input type="email" id="aptClientEmail" placeholder="vous@exemple.com">
      </div>
    </div>
    <div class="form-row">
      <label for="aptNotes">Notes (optionnel)</label>
      <textarea id="aptNotes" placeholder="Précisions sur la demande..."></textarea>
    </div>
    <div class="modal-error" id="appointmentModalError"></div>
    <div class="modal-actions">
      <button class="cancel-btn" id="appointmentModalCancel">Annuler</button>
      <button class="save-btn" id="appointmentModalSave">Enregistrer</button>
    </div>
  </div>
</div>

<!-- Modal nouveau client -->
<div class="modal-overlay" id="clientModal">
  <div class="modal">
    <h2>Nouveau client</h2>
    <div class="form-row">
      <label for="newClientName">Nom</label>
      <input type="text" id="newClientName" placeholder="Nom et prénom">
    </div>
    <div class="form-row">
      <label for="newClientPhone">Téléphone</label>
      <input type="tel" id="newClientPhone" placeholder="06 12 34 56 78">
    </div>
    <div class="form-row">
      <label for="newClientEmail">Email (optionnel)</label>
      <input type="email" id="newClientEmail" placeholder="vous@exemple.com">
    </div>
    <div class="form-row">
      <label for="newClientNotes">Notes (optionnel)</label>
      <textarea id="newClientNotes" placeholder="Préférences, anecdotes..."></textarea>
    </div>
    <div class="modal-error" id="clientModalError"></div>
    <div class="modal-actions">
      <button class="cancel-btn" id="clientModalCancel">Annuler</button>
      <button class="save-btn" id="clientModalSave">Enregistrer</button>
    </div>
  </div>
</div>

<script src="../js/admin.js"></script>
</body>
</html>
